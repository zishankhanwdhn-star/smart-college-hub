version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: college_hub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: college_user
      POSTGRES_PASSWORD: college_pass
      POSTGRES_DB: college_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U college_user -d college_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: college_hub_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://college_user:college_pass@db:5432/college_hub
      SECRET_KEY: change-this-to-a-long-random-secret-key-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 10
      ALLOWED_EXTENSIONS: pdf,jpg,jpeg,png,doc,docx
      ADMIN_EMAIL: admin@gpcwaidhan.ac.in
      ADMIN_PASSWORD: Admin@123
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"

  # ── React Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: college_hub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
